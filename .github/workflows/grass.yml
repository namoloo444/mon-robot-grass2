name: Grass_Direct_No_Proxy

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

jobs:
  run-grass:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installer Dépendances
        run: pip install websockets==10.4

      - name: Lancer le Bot
        run: python grass_bot.py
